<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 13 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <button id="button1">Grow Larger</button>
    <button id="button2">Grow Smaller</button>
    <button id="button3">Grow Taller</button>
    <button id="button4">Grow Shorter</button>

    <div class="avatar">
      <img
        src="https://www.khanacademy.org/images/avatars/svg/aqualine-sapling.svg"
        width="150"
      />
      <h1>Aqualine</h1>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    
      // ======================== Button #1
      $("#button1").click(function () {
       $(".avatar").animate({
        width: "400px",
        marginLeft: "30px",
        borderWidth: "10px"
      }, 1500);
      });

      // ======================== Button #2
      $("#button2").click(function () {
        $(".avatar").animate({
        width: "200px",
        marginLeft: "30px",
        borderWidth: "10px"
      }, 1500);
      });

      // ======================== Button #3
      $("#button3").click(function () {
        $(".avatar").animate({
        height: "400px",
        marginLeft: "30px",
        borderWidth: "10px"
      }, 1500);
      });

       // ======================== Button #4
      $("#button4").click(function () {
        $(".avatar").animate({
        height: "200px",
        marginLeft: "30px",
        borderWidth: "10px"
      }, 1500);
      });
    
    
    
    </script>
  </body>
</html>
